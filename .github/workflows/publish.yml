name: Publish to PyPI

on:
  push:
    branches:
      - PyPI_publish

permissions:
  contents: read

jobs:
  # ── Build platform wheels ──────────────────────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64
          # Linux aarch64 (cross-compiled)
          - os: ubuntu-latest
            target: aarch64
          # macOS x86_64 (Intel, cross-compiled on Apple Silicon runner)
          - os: macos-latest
            target: x86_64
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            target: aarch64
          # Windows x86_64
          - os: windows-latest
            target: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/

  # ── Build source distribution ──────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/

  # ── Publish to PyPI ────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    # Optional: use trusted publisher (OIDC) instead of API token
    # See: https://docs.pypi.org/trusted-publishers/using-a-publisher/
    # environment:
    #   name: pypi
    #   url: https://pypi.org/p/piaso-tools
    # permissions:
    #   id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # For trusted publisher (OIDC), remove the password line above
          # and uncomment the environment/permissions block above
